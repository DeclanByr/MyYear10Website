-webkit-keyframes moveX {
  from { left: 0; } to { left: calc(100% - 50px); } /* Adjust the 'to' value to make the element move horizontally */
}
@-moz-keyframes moveX {
  from { left: 0; } to { left: calc(100% - 50px); }
}

  from { left: 0; } to { left: calc(100% - 50px); }
}
@keyframes moveX {
  from { left: 0; } to { left: calc(100% - 50px); }
}

@-webkit-keyframes moveY {
